<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280"/>
  <title>TAVIL · Portal intern (Desktop)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: "Instrument Sans", system-ui, -apple-system, sans-serif;
      font-feature-settings: "ss01", "cv01";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background: #f7f7f2;
      color: #222725;
      min-width: 1280px;
    }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.28); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.5); border: 2px solid transparent; background-clip: padding-box; }
    a { color: inherit; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Tokens + data (reused from mobile) -->
  <script type="text/babel" src="tokens.jsx"></script>

  <!-- Desktop-specific components -->
  <script type="text/babel" src="desktop-primitives.jsx"></script>
  <script type="text/babel" src="desktop-transitions.jsx"></script>
  <script type="text/babel" src="desktop-shell.jsx"></script>
  <script type="text/babel" src="desktop-screens-1.jsx"></script>
  <script type="text/babel" src="desktop-screens-2.jsx"></script>
  <script type="text/babel" src="admin-primitives.jsx"></script>
  <script type="text/babel" src="admin-dashboard.jsx"></script>
  <script type="text/babel" src="admin-users.jsx"></script>
  <script type="text/babel" src="admin-content.jsx"></script>
  <script type="text/babel" src="desktop-app.jsx"></script>
</body>
</html>
