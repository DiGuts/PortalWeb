<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TAVIL · Portal mòbil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Instrument Sans', -apple-system, system-ui, sans-serif;
      background: #f0eee9;
      -webkit-font-smoothing: antialiased;
    }
    .phone-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .hide-sb::-webkit-scrollbar { display: none; }
    @keyframes pushInRight  { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes pushOutLeft  { from { transform: translateX(0); } to { transform: translateX(-28%); opacity: .7; } }
    @keyframes pushInLeft   { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes pushOutRight { from { transform: translateX(0); } to { transform: translateX(28%); opacity: .7; } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="tokens.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-more.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</head>
<body>
  <div class="phone-wrap">
    <div id="root"></div>
  </div>
  <script type="text/babel">
    function PhoneFrameHost() {
      const [size, setSize] = React.useState({ w: 390, h: 844 });
      React.useEffect(() => {
        const calc = () => {
          const maxH = window.innerHeight - 48;
          const maxW = window.innerWidth - 48;
          let w = 390, h = 844;
          if (h > maxH) { h = maxH; w = h * 390 / 844; }
          if (w > maxW) { w = maxW; h = w * 844 / 390; }
          setSize({ w: Math.round(w), h: Math.round(h) });
        };
        calc();
        window.addEventListener('resize', calc);
        return () => window.removeEventListener('resize', calc);
      }, []);
      return (
        <window.PhoneFrame width={size.w} height={size.h}>
          <window.App/>
        </window.PhoneFrame>
      );
    }
    const mount = () => {
      if (!window.App || !window.PhoneFrame) { requestAnimationFrame(mount); return; }
      ReactDOM.createRoot(document.getElementById('root')).render(<PhoneFrameHost/>);
    };
    mount();
  </script>
</body>
</html>
