<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TAVIL Portal — Mobile directions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Instrument Sans', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="tokens.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-more.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Re-usable single-screen preview that wraps one screen in a PhoneFrame
    // with its own context (theme / accent / lang).
    function ScreenPreview({ render, darkMode = false, accent = 'mahogany', lang = 'ca', w = 340, h = 736 }) {
      const theme = window.TAVIL_THEMES[darkMode ? 'dark' : 'light'];
      const acc = window.TAVIL_ACCENTS[accent];
      const t = window.TAVIL_I18N[lang];
      const user = window.TAVIL_DATA.user;
      const ctx = { theme, accent: acc, t, user, lang, darkMode, accentKey: accent, setDarkMode: ()=>{}, setAccentKey: ()=>{}, setLang: ()=>{} };
      return (
        <window.AppCtx.Provider value={ctx}>
          <window.PhoneFrame width={w} height={h} theme={theme}>
            <div style={{ height: '100%', background: theme.bg, color: theme.text, fontFamily: 'Instrument Sans, sans-serif' }}>
              {render({ theme, accent: acc, t })}
            </div>
          </window.PhoneFrame>
        </window.AppCtx.Provider>
      );
    }

    // Variation wrappers (for each, we render the screen directly or with a twist)
    const Noop = () => {};

    // Variation A — Default (mahogany, light)
    const LoginA = () => <ScreenPreview render={() => <window.LoginScreen onLogin={Noop}/>} />;
    const RegisterA = () => <ScreenPreview render={() => <window.RegisterScreen onBack={Noop} onNext={Noop}/>} />;
    const VerifyA = () => <ScreenPreview render={() => <window.VerifyScreen email="marta.vidal@tavil.com" onBack={Noop} onVerified={Noop}/>} />;
    const ForgotA = () => <ScreenPreview render={() => <window.ForgotScreen onBack={Noop} onSent={Noop}/>} />;
    const CampusA = () => <ScreenPreview render={() => <window.CampusScreen onBack={Noop}/>} />;
    const EspaiA = () => <ScreenPreview render={() => <window.EspaiScreen onBack={Noop}/>} />;
    const NotifsA = () => <ScreenPreview render={() => <window.NotificationsScreen onBack={Noop} onNavigate={Noop}/>} />;
    const HomeA  = () => <ScreenPreview render={() => <window.HomeScreen onOpenDrawer={Noop} onNavigate={Noop} onOpenNews={Noop}/>} />;
    const NewsA  = () => <ScreenPreview render={() => <window.NewsScreen onOpenDrawer={Noop} onOpenNews={Noop}/>} />;
    const NewsDetailA = () => <ScreenPreview render={() => <window.NewsDetailScreen id="n1" onBack={Noop}/>} />;
    const AgendaA = () => <ScreenPreview render={() => <window.AgendaScreen onOpenDrawer={Noop}/>} />;
    const DirectoryA = () => <ScreenPreview render={() => <window.DirectoryScreen onOpenDrawer={Noop}/>} />;
    const ActivitiesA = () => <ScreenPreview render={() => <window.ActivitiesScreen onBack={Noop}/>} />;
    const VoiceA = () => <ScreenPreview render={() => <window.VoiceScreen onBack={Noop}/>} />;
    const RequestsA = () => <ScreenPreview render={() => <window.RequestsScreen onBack={Noop}/>} />;
    const ProfileA = () => <ScreenPreview render={() => <window.ProfileScreen onBack={Noop} onLogout={Noop}/>} />;
    const MoreA = () => <ScreenPreview render={() => <window.MoreScreen onNavigate={Noop} onLogout={Noop}/>} />;

    // Dark variants
    const LoginDark = () => <ScreenPreview darkMode render={() => <window.LoginScreen onLogin={Noop}/>} />;
    const HomeDark  = () => <ScreenPreview darkMode render={() => <window.HomeScreen onOpenDrawer={Noop} onNavigate={Noop} onOpenNews={Noop}/>} />;
    const NewsDark  = () => <ScreenPreview darkMode render={() => <window.NewsScreen onOpenDrawer={Noop} onOpenNews={Noop}/>} />;

    // Accent variants of Home (same content, different accent)
    const HomeTerracotta = () => <ScreenPreview accent="terracotta" render={() => <window.HomeScreen onOpenDrawer={Noop} onNavigate={Noop} onOpenNews={Noop}/>} />;
    const HomeOxblood = () => <ScreenPreview accent="oxblood" render={() => <window.HomeScreen onOpenDrawer={Noop} onNavigate={Noop} onOpenNews={Noop}/>} />;
    const HomeClay = () => <ScreenPreview accent="clay" render={() => <window.HomeScreen onOpenDrawer={Noop} onNavigate={Noop} onOpenNews={Noop}/>} />;

    // Language variants of Home
    const HomeES = () => <ScreenPreview lang="es" render={() => <window.HomeScreen onOpenDrawer={Noop} onNavigate={Noop} onOpenNews={Noop}/>} />;
    const HomeEN = () => <ScreenPreview lang="en" render={() => <window.HomeScreen onOpenDrawer={Noop} onNavigate={Noop} onOpenNews={Noop}/>} />;

    // Full prototype artboard — the main app
    function FullProto() {
      const [size] = React.useState({ w: 390, h: 820 });
      return <window.PhoneFrame width={size.w} height={size.h}><window.App/></window.PhoneFrame>;
    }

    function Root() {
      const [ready, setReady] = useState(false);
      useEffect(() => {
        const check = () => {
          if (window.App && window.PhoneFrame && window.LoginScreen && window.HomeScreen && window.DesignCanvas) {
            setReady(true);
          } else requestAnimationFrame(check);
        };
        check();
      }, []);
      if (!ready) return <div style={{ padding: 40, fontFamily: 'Instrument Sans' }}>Loading…</div>;

      const DC = window.DesignCanvas;
      const DS = window.DCSection;
      const DA = window.DCArtboard;

      return (
        <DC>
          <DS id="prototype" title="Interactive prototype" subtitle="The full app — tap through. Use Tweaks (top-right toggle) for theme / accent / language.">
            <DA id="full" label="Full app · login → home → stack" width={390} height={820}>
              <FullProto/>
            </DA>
            <DA id="dark-full" label="Full app · dark mode" width={340} height={736}>
              <ScreenPreview darkMode render={() => {
                const { useState } = React;
                const [s, setS] = useState('home');
                return <window.HomeScreen onOpenDrawer={()=>{}} onNavigate={()=>{}} onOpenNews={()=>{}}/>;
              }}/>
            </DA>
          </DS>

          <DS id="key-screens" title="Key screens" subtitle="Every tab + every pushed screen, in light mode.">
            <DA id="login" label="01 · Login" width={340} height={736}><LoginA/></DA>
            <DA id="register" label="01b · Register (step 1/2)" width={340} height={736}><RegisterA/></DA>
            <DA id="verify" label="01c · Email verification (step 2/2)" width={340} height={736}><VerifyA/></DA>
            <DA id="forgot" label="01d · Forgot password" width={340} height={736}><ForgotA/></DA>
            <DA id="home" label="02 · Home / dashboard" width={340} height={736}><HomeA/></DA>
            <DA id="notifs" label="02b · Notifications center" width={340} height={736}><NotifsA/></DA>
            <DA id="news" label="03 · News feed" width={340} height={736}><NewsA/></DA>
            <DA id="news-detail" label="04 · News detail (swipe)" width={340} height={736}><NewsDetailA/></DA>
            <DA id="agenda" label="05 · Calendar / agenda" width={340} height={736}><AgendaA/></DA>
            <DA id="directory" label="06 · Who is who" width={340} height={736}><DirectoryA/></DA>
            <DA id="activities" label="07 · Activities / enroll" width={340} height={736}><ActivitiesA/></DA>
            <DA id="voice" label="08 · Employee voice + form" width={340} height={736}><VoiceA/></DA>
            <DA id="requests" label="09 · Personal requests + form" width={340} height={736}><RequestsA/></DA>
            <DA id="profile" label="10 · Profile + settings" width={340} height={736}><ProfileA/></DA>
            <DA id="more" label="11 · More (nav shell)" width={340} height={736}><MoreA/></DA>
            <DA id="campus" label="12 · Campus TAVIL (training)" width={340} height={736}><CampusA/></DA>
            <DA id="espai" label="13 · Espai corporatiu (docs)" width={340} height={736}><EspaiA/></DA>
          </DS>

          <DS id="dark" title="Dark mode" subtitle="Same layout, warmer carbon backgrounds, dimmed mahogany accents.">
            <DA id="login-dark" label="Login · dark" width={340} height={736}><LoginDark/></DA>
            <DA id="home-dark" label="Home · dark" width={340} height={736}><HomeDark/></DA>
            <DA id="news-dark" label="News · dark" width={340} height={736}><NewsDark/></DA>
          </DS>

          <DS id="accents" title="Accent explorations" subtitle="All in the red/earth family — same lightness, shifted hue. Pick any from the Tweaks panel in the prototype.">
            <DA id="mahogany" label="Mahogany · #bf211e (default)" width={340} height={736}><HomeA/></DA>
            <DA id="terracotta" label="Terracotta · #c2532a" width={340} height={736}><HomeTerracotta/></DA>
            <DA id="oxblood" label="Oxblood · #8a2623" width={340} height={736}><HomeOxblood/></DA>
            <DA id="clay" label="Clay · #b55139" width={340} height={736}><HomeClay/></DA>
          </DS>

          <DS id="i18n" title="Language variants" subtitle="Content pulled from the i18n JSON in the repo, extended with TAVIL-flavoured copy.">
            <DA id="ca" label="Català (default)" width={340} height={736}><HomeA/></DA>
            <DA id="es" label="Castellano" width={340} height={736}><HomeES/></DA>
            <DA id="en" label="English" width={340} height={736}><HomeEN/></DA>
          </DS>
        </DC>
      );
    }

    const rootEl = document.getElementById('root');
    ReactDOM.createRoot(rootEl).render(<Root/>);
  </script>
</body>
</html>
